services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: deploy-postgres-1
    env_file:
      - ./customer.env
    environment:
      POSTGRES_DB: ${STANDARD_OPS_POSTGRES_DB:-wanfa_ops}
      POSTGRES_USER: ${STANDARD_OPS_POSTGRES_USER:-wanfa_ops}
      POSTGRES_PASSWORD: ${STANDARD_OPS_POSTGRES_PASSWORD}
    ports:
      - "${STANDARD_OPS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - standard_ops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STANDARD_OPS_POSTGRES_USER:-wanfa_ops} -d ${STANDARD_OPS_POSTGRES_DB:-wanfa_ops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ./customer.env
    environment:
      DATABASE_URL: postgresql+psycopg://wanfa_ops:${STANDARD_OPS_POSTGRES_PASSWORD}@postgres:5432/wanfa_ops
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/research
      KNOWLEDGE_VECTOR_STORE: postgres_pgvector_store_v1
      KNOWLEDGE_EMBEDDING_PROVIDER: auto
      KNOWLEDGE_RERANKER: siliconflow_reranker_v1
    ports:
      - "8000:8080"
    volumes:
      - ../backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\""
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  trusted-inbound-worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    profiles: ["worker"]
    env_file:
      - ./customer.env
    environment:
      DATABASE_URL: postgresql+psycopg://wanfa_ops:${STANDARD_OPS_POSTGRES_PASSWORD}@postgres:5432/wanfa_ops
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app/research
      KNOWLEDGE_VECTOR_STORE: postgres_pgvector_store_v1
      KNOWLEDGE_EMBEDDING_PROVIDER: auto
      KNOWLEDGE_RERANKER: siliconflow_reranker_v1
      OUTBOX_EXTERNAL_WRITE_ENABLED: "true"
      TRUSTED_INBOUND_WORKER_ENABLED: "true"
      TRUSTED_INBOUND_WORKER_TENANT_SLUG: ${TRUSTED_INBOUND_WORKER_TENANT_SLUG:-}
      TRUSTED_INBOUND_WORKER_USER_EMAIL: ${TRUSTED_INBOUND_WORKER_USER_EMAIL:-}
      TRUSTED_INBOUND_WORKER_ID: ${TRUSTED_INBOUND_WORKER_ID:-trusted-inbound-worker-1}
      TRUSTED_INBOUND_WORKER_SLEEP_SECONDS: ${TRUSTED_INBOUND_WORKER_SLEEP_SECONDS:-5}
      TRUSTED_INBOUND_WORKER_BATCH_SIZE: ${TRUSTED_INBOUND_WORKER_BATCH_SIZE:-20}
      TRUSTED_INBOUND_WORKER_RATE_LIMIT_PER_MINUTE: ${TRUSTED_INBOUND_WORKER_RATE_LIMIT_PER_MINUTE:-60}
      TRUSTED_INBOUND_WORKER_LEASE_SECONDS: ${TRUSTED_INBOUND_WORKER_LEASE_SECONDS:-60}
      TRUSTED_INBOUND_WORKER_HEARTBEAT_STALE_AFTER_SECONDS: ${TRUSTED_INBOUND_WORKER_HEARTBEAT_STALE_AFTER_SECONDS:-180}
    command: ["python", "-m", "app.workers.trusted_inbound_worker_service"]
    volumes:
      - ../backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -m app.workers.trusted_inbound_worker_service --healthcheck"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    env_file:
      - ./customer.env
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  standard_ops_postgres:
