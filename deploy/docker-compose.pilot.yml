services:
  postgres:
    environment:
      POSTGRES_DB: ${STANDARD_OPS_POSTGRES_DB:-wanfa_ops}
      POSTGRES_USER: ${STANDARD_OPS_POSTGRES_USER:-wanfa_ops}
      POSTGRES_PASSWORD: ${STANDARD_OPS_POSTGRES_PASSWORD:-change-me-before-pilot}
    ports:
      - "${STANDARD_OPS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - standard_ops_pilot_postgres:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${STANDARD_OPS_REDIS_PORT:-6379}:6379"
    volumes:
      - standard_ops_pilot_redis:/data
    restart: unless-stopped

  backend:
    env_file:
      - ../.env.example
    environment:
      STANDARD_OPS_ENV: ${STANDARD_OPS_ENV:-pilot}
      STANDARD_OPS_ALLOWED_ORIGINS: ${STANDARD_OPS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      DATABASE_URL: postgresql+psycopg://${STANDARD_OPS_POSTGRES_USER:-wanfa_ops}:${STANDARD_OPS_POSTGRES_PASSWORD:-change-me-before-pilot}@postgres:5432/${STANDARD_OPS_POSTGRES_DB:-wanfa_ops}
      REDIS_URL: redis://redis:6379/0
      STANDARD_OPS_DEV_BOOTSTRAP_ENABLED: "false"
      OUTBOX_EXTERNAL_WRITE_ENABLED: "false"
      TRUSTED_INBOUND_WORKER_ENABLED: "false"
    ports:
      - "${STANDARD_OPS_BACKEND_PORT:-18080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()\""
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  trusted-inbound-worker:
    profiles: ["worker"]
    environment:
      STANDARD_OPS_ENV: ${STANDARD_OPS_ENV:-pilot}
      DATABASE_URL: postgresql+psycopg://${STANDARD_OPS_POSTGRES_USER:-wanfa_ops}:${STANDARD_OPS_POSTGRES_PASSWORD:-change-me-before-pilot}@postgres:5432/${STANDARD_OPS_POSTGRES_DB:-wanfa_ops}
      REDIS_URL: redis://redis:6379/0
      STANDARD_OPS_DEV_BOOTSTRAP_ENABLED: "false"
      OUTBOX_EXTERNAL_WRITE_ENABLED: "false"
      TRUSTED_INBOUND_WORKER_ENABLED: "true"
      TRUSTED_INBOUND_WORKER_TENANT_SLUG: ${TRUSTED_INBOUND_WORKER_TENANT_SLUG:-}
      TRUSTED_INBOUND_WORKER_USER_EMAIL: ${TRUSTED_INBOUND_WORKER_USER_EMAIL:-}
      TRUSTED_INBOUND_WORKER_ID: ${TRUSTED_INBOUND_WORKER_ID:-trusted-inbound-worker-1}
      TRUSTED_INBOUND_WORKER_SLEEP_SECONDS: ${TRUSTED_INBOUND_WORKER_SLEEP_SECONDS:-5}
      TRUSTED_INBOUND_WORKER_BATCH_SIZE: ${TRUSTED_INBOUND_WORKER_BATCH_SIZE:-20}
      TRUSTED_INBOUND_WORKER_RATE_LIMIT_PER_MINUTE: ${TRUSTED_INBOUND_WORKER_RATE_LIMIT_PER_MINUTE:-60}
      TRUSTED_INBOUND_WORKER_LEASE_SECONDS: ${TRUSTED_INBOUND_WORKER_LEASE_SECONDS:-60}
      TRUSTED_INBOUND_WORKER_HEARTBEAT_STALE_AFTER_SECONDS: ${TRUSTED_INBOUND_WORKER_HEARTBEAT_STALE_AFTER_SECONDS:-180}
    restart: unless-stopped

  frontend:
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "${STANDARD_OPS_FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e \"const http=require('http'); const req=http.get('http://127.0.0.1:5173', res=>process.exit(res.statusCode < 500 ? 0 : 1)); req.on('error',()=>process.exit(1)); req.setTimeout(3000,()=>process.exit(1));\""
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

volumes:
  standard_ops_pilot_postgres:
  standard_ops_pilot_redis:
